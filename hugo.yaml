theme: blowfish
baseURL: https://crazybob01.com/
defaultContentLanguage: zh-cn

enableRobotsTXT: true
summaryLength: 30
hasCJKLanguage: true
enableEmoji: true

buildDrafts: false
buildFuture: false

pagination:
  pagerSize: 10

imaging:
  anchor: Center

taxonomies:
  tag: tags
  category: categories
  author: authors

sitemap:
  changefreq: always
  filename: sitemap.xml
  priority: 0.5

outputs:
  home:
    - HTML
    - RSS
    - JSON
